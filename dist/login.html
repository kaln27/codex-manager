<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Manager Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="min-h-screen bg-[#f5f5f7] text-slate-950 antialiased">
  <div class="grid min-h-screen place-items-center p-5">
    <main class="w-[min(420px,96vw)] rounded-lg border border-white/80 bg-white/80 p-6 shadow-[0_24px_80px_rgba(15,23,42,0.12)] backdrop-blur-3xl">
      <div class="mb-6">
        <div class="mb-4 grid h-12 w-12 place-items-center rounded-lg bg-slate-950 text-xl font-semibold text-white shadow-lg shadow-slate-950/20">C</div>
        <p class="text-xs font-bold uppercase tracking-normal text-slate-500">Codex Manager</p>
        <h1 class="mt-2 text-3xl font-semibold tracking-normal text-slate-950">输入访问密码</h1>
        <p class="mt-3 text-sm leading-6 text-slate-500">请输入密码以继续使用 Codex Manager。</p>
      </div>
      <form id="loginForm" class="grid gap-4">
        <div>
          <label class="mb-2 block text-xs font-semibold text-slate-500">密码</label>
          <input id="password" class="w-full rounded-lg border border-slate-200 bg-white/85 px-3 py-2.5 text-sm text-slate-950 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10" type="password" autocomplete="current-password" autofocus>
        </div>
        <button class="rounded-full bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm shadow-blue-600/20 transition hover:bg-blue-700 hover:shadow-md" type="submit">登录</button>
        <div id="status" class="min-h-6 text-sm text-red-600"></div>
      </form>
    </main>
  </div>
  <script>
    const form = document.getElementById("loginForm");
    const password = document.getElementById("password");
    const status = document.getElementById("status");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.textContent = "";
      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({password: password.value}),
        });
        const data = await response.json();
        if (!response.ok || data.ok === false) throw new Error(data.error || "登录失败。");
        window.location.href = "/";
      } catch (error) {
        status.textContent = error.message;
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Manager Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="login-wrap">
      <main class="login-card">
        <div class="login-head">
          <div class="brand-logo">C</div>
          <p class="login-title">输入访问密码</p>
          <p class="login-sub">请输入密码以继续使用 <span class="mono-inline">Codex Manager</span> 本地 console。</p>
        </div>
        <form id="loginForm" class="login-form">
          <label class="field">
            <span class="field-label">密码</span>
            <input id="password" class="input" type="password" autocomplete="current-password" autofocus>
          </label>
          <button class="login-submit" type="submit">登录</button>
          <div id="status" class="login-error"></div>
        </form>
      </main>
    </div>
  </div>
  <script>
    const form = document.getElementById("loginForm");
    const password = document.getElementById("password");
    const status = document.getElementById("status");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.textContent = "";
      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({password: password.value}),
        });
        const data = await response.json();
        if (!response.ok || data.ok === false) throw new Error(data.error || "登录失败。");
        window.location.href = "/";
      } catch (error) {
        status.textContent = error.message;
      }
    });
  </script>
</body>
</html>
